name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-mcp-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          cd mcp
          python -m venv .venv
          . .venv/bin/activate
          pip install fastmcp>=0.4.0 httpx dnspython

      - name: Test MCP server starts and lists tools
        run: |
          cd mcp
          . .venv/bin/activate
          python -c "
          import subprocess, json, time
          proc = subprocess.Popen(
              ['python', '-m', 'server'],
              stdin=subprocess.PIPE, stdout=subprocess.PIPE, stderr=subprocess.PIPE,
              text=True
          )
          # Initialize
          req = json.dumps({'jsonrpc':'2.0','id':0,'method':'initialize','params':{'protocolVersion':'2024-11-05','capabilities':{},'clientInfo':{'name':'ci','version':'1.0'}}})
          proc.stdin.write(req + '\n')
          proc.stdin.flush()
          # Notify initialized
          proc.stdin.write(json.dumps({'jsonrpc':'2.0','method':'notifications/initialized','params':{}}) + '\n')
          proc.stdin.flush()
          # List tools
          proc.stdin.write(json.dumps({'jsonrpc':'2.0','id':1,'method':'tools/list','params':{}}) + '\n')
          proc.stdin.flush()
          time.sleep(3)
          proc.stdin.close()
          out = proc.stdout.read()
          proc.wait()
          for line in out.strip().split('\n'):
              try:
                  d = json.loads(line)
                  if 'result' in d and 'tools' in d.get('result', {}):
                      tools = d['result']['tools']
                      assert len(tools) >= 100, f'Expected 100+ tools, got {len(tools)}'
                      print(f'PASS: {len(tools)} tools registered')
                      break
              except:
                  pass
          else:
              print('FAIL: No tools/list response')
              print('Output:', out[:1000])
              exit(1)
          " 2>&1 | tail -5

  validate-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          for f in \
            .claude-plugin/plugin.json \
            .claude-plugin/marketplace.json \
            .cursor-plugin/plugin.json \
            .codex-plugin/plugin.json \
            .kimi-plugin/plugin.json \
            gemini-extension.json \
            package.json \
            hooks/hooks.json \
            hooks/hooks-cursor.json \
            hooks/hooks-codex.json; do
            python -m json.tool "$f" > /dev/null || { echo "INVALID: $f"; exit 1; }
            echo "OK: $f"
          done

  validate-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check Python syntax
        run: |
          find mcp/cyber_tools -name "*.py" -exec python -m py_compile {} \;
          python -m py_compile mcp/server.py
          echo "All Python files compile OK"